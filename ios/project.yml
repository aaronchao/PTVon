name: PTVon
options:
  bundleIdPrefix: com.ptvon
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Automatic signing. Simulator builds sign ad-hoc with no team; device /
    # TestFlight builds pass DEVELOPMENT_TEAM on the xcodebuild command line.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
targets:
  PTVon:
    type: application
    platform: iOS
    sources:
      - path: PTVon
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ptvon.app
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: PTVon/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: PTVonWidgetsExtension
        embed: true
      - target: PTVonWatch
        embed: true
  PTVonWatch:
    type: application
    platform: watchOS
    sources:
      - path: WatchApp
      - path: Shared/RouteType.swift
      - path: Shared/Color+Hex.swift
      - path: PTVon/Models.swift
      - path: PTVon/PtvService.swift
      - path: PTVon/KnownStops.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ptvon.app.watchkitapp
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: WatchApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"
    dependencies:
      - target: PTVonWatchWidgets
        embed: true
  PTVonWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: WatchWidgets
      - path: Shared/RouteType.swift
      - path: Shared/Color+Hex.swift
      - path: PTVon/Models.swift
      - path: PTVon/PtvService.swift
      - path: PTVon/KnownStops.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ptvon.app.watchkitapp.widgets
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: WatchWidgets/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
  PTVonWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PTVonWidgets
      - path: Shared
      - path: PTVon/Models.swift
      - path: PTVon/PtvService.swift
      - path: PTVon/KnownStops.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ptvon.app.widgets
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: PTVonWidgets/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: "YES"
